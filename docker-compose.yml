services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  manual-test-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8527:8000"
    env_file:
      - .env
    environment:
      FRONTEND_SESSION_REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
